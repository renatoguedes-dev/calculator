<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Calculator</title>

  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>

</head>
<body>
  <main id="main">
    <div id="calculator-body">
      <div class="display">
        <div class="display-history">203</div>
        <div class="display-current">506-84</div>
      </div>
      <div class="btn clear-btn">Clear</div>
      <button type="button" class="btn del-btn">Del</button>
      <button type="button" class="btn div-btn oper-btns">÷</button>
      <button type="button" class="btn multiply-btn oper-btns">x</button>
      <button type="button" class="btn minus-btn oper-btns">-</button>
      <button type="button" class="btn plus-btn oper-btns">+</button>
      <button type="button" class="btn equals-btn oper-btns">=</button>
      <button type="button" class="btn zero-btn number-btns">0</button>
      <button type="button" class="btn one-btn number-btns">1</button>
      <button type="button" class="btn two-btn number-btns">2</button>
      <button type="button" class="btn three-btn number-btns">3</button>
      <button type="button" class="btn four-btn number-btns">4</button>
      <button type="button" class="btn five-btn number-btns">5</button>
      <button type="button" class="btn six-btn number-btns">6</button>
      <button type="button" class="btn seven-btn number-btns">7</button>
      <button type="button" class="btn eight-btn number-btns">8</button>
      <button type="button" class="btn nine-btn number-btns">9</button>
      <button type="button" class="btn period-btn number-btns">.</button>
    </div>
  </main>


</body>
</html>
